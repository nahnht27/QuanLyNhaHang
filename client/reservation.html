<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đặt Bàn – Happy Dinner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-hd">
  <div class="container">
    <a class="navbar-brand" href="index.html">Happy <span>Dinner</span></a>
    <div class="d-flex gap-3">
      <a href="index.html"       class="nav-link">Trang chủ</a>
      <a href="menu.html"        class="nav-link">Thực đơn</a>
      <a href="reservation.html" class="nav-link" style="color:#C8973A !important;font-weight:600;">Đặt bàn</a>
    </div>
  </div>
</nav>

<!-- HEADER -->
<div style="background:linear-gradient(135deg,#3D1F0A,#6B3A1F);padding:2.5rem 0;text-align:center;">
  <h2 style="color:#fff;font-weight:700;margin:0;">Đặt Bàn</h2>
  <div style="width:50px;height:2px;background:#C8973A;margin:.75rem auto;border-radius:2px;"></div>
  <p style="color:rgba(255,255,255,.7);margin:0;">Đặt trước để có chỗ ngồi tốt nhất</p>
</div>

<!-- TOAST -->
<div id="toast" class="toast-hd"></div>

<div class="container py-5" style="max-width:600px;">
  <div class="card-hd p-4">
    <div class="card-header mb-4" style="margin:-1.5rem -1.5rem 1.5rem;border-radius:8px 8px 0 0;background:#6B3A1F;color:#fff;padding:1rem 1.5rem;font-weight:600;">
      Thông tin đặt bàn
    </div>

    <div class="mb-3">
      <label class="form-label">Họ và tên *</label>
      <input id="fullName" type="text" class="form-control" placeholder="Nguyễn Văn A" />
    </div>
    <div class="mb-3">
      <label class="form-label">Số điện thoại *</label>
      <input id="phone" type="tel" class="form-control" placeholder="0901234567" />
    </div>
    <div class="row g-3 mb-3">
      <div class="col-md-6">
        <label class="form-label">Ngày & giờ đến *</label>
        <input id="reservationDate" type="datetime-local" class="form-control" />
      </div>
      <div class="col-md-6">
        <label class="form-label">Số khách *</label>
        <input id="guestCount" type="number" class="form-control" placeholder="2" min="1" max="20" />
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Chọn bàn *</label>
      <select id="tableSelect" class="form-select">
        <option value="">-- Đang tải danh sách bàn trống --</option>
      </select>
    </div>
    <div class="mb-4">
      <label class="form-label">Ghi chú</label>
      <textarea id="note" class="form-control" rows="2" placeholder="Yêu cầu đặc biệt, dị ứng thực phẩm…"></textarea>
    </div>

    <button class="btn btn-hd-gold w-100 py-2" onclick="submitReservation()">
      Xác nhận đặt bàn
    </button>
  </div>
</div>

<footer style="background:#3D1F0A;color:rgba(255,255,255,.55);text-align:center;padding:1.1rem;font-size:.82rem;">
  © 2026 Happy Dinner &nbsp;|&nbsp; Đồ án môn Cơ Sở Dữ Liệu
</footer>

<a href="login.html" style="
  position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;
  background:#3D1F0A;color:rgba(255,255,255,.65);
  border:1px solid rgba(200,151,58,.4);border-radius:50px;
  padding:.45rem 1rem;font-size:.73rem;font-weight:500;
  letter-spacing:.06em;text-transform:uppercase;
  display:flex;align-items:center;gap:.4rem;text-decoration:none;
  box-shadow:0 4px 12px rgba(61,31,10,.5);"
  onmouseover="this.style.color='#fff';this.style.borderColor='#C8973A';"
  onmouseout="this.style.color='rgba(255,255,255,.65)';this.style.borderColor='rgba(200,151,58,.4)';">
  <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="currentColor" viewBox="0 0 16 16">
    <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.029 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
  </svg>
  Đăng nhập nhân viên
</a>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API = window.location.port === '5500' ? 'http://localhost:3000' : '';

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `toast-hd ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3500);
}

async function loadTables() {
  try {
    const res  = await fetch(API + '/api/reservation/tables');
    const data = await res.json();
    const sel  = document.getElementById('tableSelect');
    sel.innerHTML = '<option value="">-- Chọn bàn --</option>';
    if (!data.length) {
      sel.innerHTML = '<option value="">Hiện không có bàn trống</option>';
      return;
    }
    data.forEach(t => {
      sel.innerHTML += `<option value="${t.TableID}">${t.TableName} (${t.Capacity} khách)</option>`;
    });
  } catch {
    showToast('Không tải được danh sách bàn', 'error');
  }
}

async function submitReservation() {
  const body = {
    fullName:        document.getElementById('fullName').value.trim(),
    phone:           document.getElementById('phone').value.trim(),
    reservationDate: document.getElementById('reservationDate').value,
    guestCount:      document.getElementById('guestCount').value,
    tableID:         document.getElementById('tableSelect').value,
    note:            document.getElementById('note').value.trim()
  };

  if (!body.fullName || !body.phone || !body.reservationDate || !body.guestCount || !body.tableID) {
    showToast('Vui lòng điền đầy đủ thông tin!', 'error');
    return;
  }

  try {
    const res  = await fetch(API + '/api/reservation', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    showToast(data.message, 'success');
    // Reset form
    ['fullName','phone','reservationDate','guestCount','note'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('tableSelect').selectedIndex = 0;
    loadTables(); // refresh bàn trống
  } catch (e) {
    showToast(e.message || 'Đặt bàn thất bại!', 'error');
  }
}

// Set min datetime to now
const now = new Date();
now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
document.getElementById('reservationDate').min = now.toISOString().slice(0,16);

loadTables();
</script>
</body>
</html>
